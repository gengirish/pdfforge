app = "pdfforge-api"
primary_region = "bom"

[build]
  dockerfile = "Dockerfile"

[env]
  MAX_CONTENT_LENGTH_MB = "50"
  WAITLIST_DB_PATH = "/app/data/waitlist.db"
  CORS_ORIGINS = "https://pdfforge-frontend.vercel.app,https://pdfforge.intelliforge.tech,https://hire-with-giri.vercel.app,http://127.0.0.1:3000,http://localhost:3000"

[http_service]
  internal_port = 5050
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "20s"
    method = "GET"
    path = "/api/v1/health"
