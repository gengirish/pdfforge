name: CI

on:
  push:
    branches-ignore:
      - main
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-checks:
    name: Backend Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: pip install -r requirements.txt

      - name: Compile backend
        run: python -m py_compile app.py

      - name: Backend health smoke check
        run: |
          python - <<'PY'
          from app import app
          client = app.test_client()
          resp = client.get("/api/v1/health")
          assert resp.status_code == 200, resp.status_code
          payload = resp.get_json()
          assert payload["status"] == "ok", payload
          print("Backend smoke check passed.")
          PY

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

  e2e-local:
    name: E2E Local Integration
    runs-on: ubuntu-latest
    needs:
      - backend-checks
      - frontend-build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend dependencies
        run: pip install -r requirements.txt

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browser
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Start backend
        run: |
          nohup python app.py > backend.log 2>&1 &

      - name: Wait for backend health
        run: |
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:5050/api/v1/health >/dev/null; then
              echo "Backend is healthy."
              exit 0
            fi
            sleep 2
          done
          echo "Backend failed health check."
          exit 1

      - name: Run Playwright E2E
        working-directory: frontend
        env:
          NEXT_PUBLIC_BACKEND_URL: http://127.0.0.1:5050
          BACKEND_API_URL: http://127.0.0.1:5050
        run: npm run e2e

      - name: Upload E2E artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: |
            frontend/test-results
            backend.log
